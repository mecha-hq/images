package:
  name: yamllint
  version: "1.35.1"
  epoch: 0
  cpe:
    vendor: "adrienverge"
    product: "yamllint"
  description: adrienverge/yamllint image.
  copyright:
    - license: MIT
      paths:
        - "*"
  dependencies:
    runtime:
      - python3
  checks: {}

capabilities:
  add: []
  drop: []

update:
  enabled: false

environment:
  contents:
    repositories:
      - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
      - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
    packages:
      - apk-tools
      - busybox
      - python3
      - py3-pip

pipeline:
  - name: Update registries
    runs: apk update
  - name: Install yamllint
    runs: |
      python3 -m venv /opt/yamllint
      . /opt/yamllint/bin/activate
      pip install yamllint==${{package.version}}
      mkdir -p ${{targets.destdir}}/usr/lib/python3.12
      cp -R /usr/lib/python3.12/site-packages/ ${{targets.destdir}}/usr/lib/python3.12/
      mkdir -p ${{targets.destdir}}/usr/bin
      cp /opt/yamllint/bin/yamllint ${{targets.destdir}}/usr/bin/yamllint
