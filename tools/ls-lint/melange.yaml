package:
  name: ls-lint
  version: 2.3.1
  epoch: 0
  cpe:
    vendor: "loeffel-io"
    product: "ls-lint"
  description: loeffel-io/ls-lint image.
  copyright:
    - license: MIT
      paths:
        - "*"
  dependencies:
    runtime:
      - nodejs-current
  checks: {}

capabilities:
  add: []
  drop: []

update:
  enabled: false

environment:
  contents:
    repositories:
      - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
      - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
    packages:
      - apk-tools
      - busybox
      - nodejs-current
      - npm

pipeline:
  - name: Update registries
    runs: apk update
  - name: Build NPM Base Image
    runs: npm install @ls-lint/ls-lint@${{package.version}} -g --prefix "${{targets.destdir}}"
