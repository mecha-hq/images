package:
  name: checkmake
  version: 0.2.2
  epoch: 0
  cpe:
    vendor: "mrtazz"
    product: "checkmake"
  description: mrtazz/checkmake image.
  copyright:
    - license: MIT
      paths:
        - "*"
  dependencies:
    runtime: []
  checks: {}

capabilities:
  add: []
  drop: []

update:
  enabled: false

environment:
  contents:
    repositories:
      - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
      - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
    packages:
      - apk-tools
      - busybox
      - go

pipeline:
  - name: Update registries
    runs: apk update
  - name: Install checkmake
    uses: go/install
    with:
      package: github.com/mrtazz/checkmake/cmd/checkmake
      version: ${{package.version}}
