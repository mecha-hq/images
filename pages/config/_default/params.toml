# -- Theme Options --
# These options control how the theme functions and allow you to
# customise the display of your website.
#
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/configuration/#theme-parameters

autoSwitchAppearance = false
colorScheme = "ocean"
defaultAppearance = "dark" # valid options: light or dark

enableCodeCopy = true
enableSearch = false

replyByEmail = false

# mainSections = ["section1", "section2"]
# robots = ""

disableImageOptimization = false
disableTextInHeader = false
# backgroundImageWidth = 1200

# defaultBackgroundImage = "IMAGE.jpg" # used as default for background images
# defaultFeaturedImage = "IMAGE.jpg" # used as default for featured images in all articles

# highlightCurrentMenuArea = true
# smartTOC = true
# smartTOCHideUnfocusedChildren = true

forgejoDefaultServer = "https://v8.next.forgejo.org"
giteaDefaultServer = "https://git.fsfe.org"

[header]
  layout = "fixed-fill-blur" # valid options: basic, fixed, fixed-fill, fixed-gradient, fixed-fill-blur

[footer]
  showAppearanceSwitcher = false
  showCopyright = true
  showMenu = true
  showScrollToTop = true
  showThemeAttribution = true

[homepage]
  cardView = false
  cardViewScreenWidth = false
  homepageImage = "img/background.jpg" # used in: hero, and card
  layout = "background" # valid options: page, profile, hero, card, background, custom
  layoutBackgroundBlur = false # only used when layout equals background
  showMoreLink = false
  showMoreLinkDest = "/posts/"
  showRecent = false
  showRecentItems = 5

[article]
  showAuthor = false
  showDate = true
  showDateOnlyInArticle = false
  showDateUpdated = false
  showLikes = false
  showViews = false
  # showAuthorBottom = false
  showHero = false
  # heroStyle = "basic" # valid options: basic, big, background, thumbAndBackground
  layoutBackgroundBlur = true # only used when heroStyle equals background or thumbAndBackground
  layoutBackgroundHeaderSpace = true # only used when heroStyle equals background
  showBreadcrumbs = false
  showDraftLabel = true
  showEdit = false
  # editURL = "https://github.com/username/repo/"
  editAppendPath = true
  invertPagination = false
  seriesOpened = false
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = false
  # showRelatedContent = false
  # relatedContentLimit = 3
  showAuthorsBadges = false
  showTaxonomies = false
  showWordCount = true
  # sharingLinks = [ "linkedin", "twitter", "bluesky", "mastodon", "reddit", "pinterest", "facebook", "email", "whatsapp", "telegram"]
  showZenMode = false

[report]
  showAuthor = false
  showDate = false
  showDateOnlyInArticle = false
  showDateUpdated = false
  showLikes = false
  showViews = false
  # showAuthorBottom = false
  showHero = false
  # heroStyle = "basic" # valid options: basic, big, background, thumbAndBackground
  layoutBackgroundBlur = true # only used when heroStyle equals background or thumbAndBackground
  layoutBackgroundHeaderSpace = true # only used when heroStyle equals background
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  # editURL = "https://github.com/username/repo/"
  editAppendPath = true
  invertPagination = false
  seriesOpened = false
  showHeadingAnchors = true
  showPagination = false
  showReadingTime = false
  showTableOfContents = false
  # showRelatedContent = false
  # relatedContentLimit = 3
  showAuthorsBadges = false
  showTaxonomies = false
  showWordCount = false
  # sharingLinks = [ "linkedin", "twitter", "bluesky", "mastodon", "reddit", "pinterest", "facebook", "email", "whatsapp", "telegram"]
  showZenMode = false

[list]
  showHero = false
  # heroStyle = "background" # valid options: basic, big, background, thumbAndBackground
  cardView = false
  cardViewScreenWidth = false
  constrainItemsWidth = false
  groupByYear = false
  layoutBackgroundBlur = true # only used when heroStyle equals background or thumbAndBackground
  layoutBackgroundHeaderSpace = true # only used when heroStyle equals background
  orderByWeight = false
  showBreadcrumbs = true
  showCards = false
  showLikes = false
  showSummary = false
  showTableOfContents = false
  showViews = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showHero = false
  showTermCount = true
  # heroStyle = "background" # valid options: basic, big, background, thumbAndBackground
  cardView = false
  showBreadcrumbs = false
  showLikes = false
  showTableOfContents = false
  showViews = false

[term]
  showHero = false
  # heroStyle = "background" # valid options: basic, big, background, thumbAndBackground
  cardView = false
  cardViewScreenWidth = false
  groupByYear = false
  showBreadcrumbs = false
  showLikes = false
  showTableOfContents = true
  showViews = false

